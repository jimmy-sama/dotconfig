---
- name: Install Debian build dependencies.
  become: true
  ansible.builtin.apt:
    name: "{{ debian_build_requirements }}"
    state: present
  loop: "{{ debian_build_requirements }}"

- name: Install Debian additional packages
  become: true
  ansible.builtin.apt:
    name: "{{ debian_additional_packages }}"
    state: present

- name: Install lua-language-server with the dedicated play
  ansible.builtin.include_tasks: "lua_ls.yml"

- name: Install nodejs and npm
  become: true
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present

- name: Install (or upgrade) pyright and bash-language-server globally using npm
  become: true
  community.general.npm:
    name: pyright
    global: yes
    state: latest
